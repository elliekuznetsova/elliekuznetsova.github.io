<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My CV</title>
  <style>
    #pdf-container {
      width: 100%;
      height: 800px;
      border: 1px solid #ccc;
      overflow: auto;
    }
    canvas {
      display: block;
      margin: 0 auto 10px auto;
    }
  </style>
</head>
<body>

<h1>My CV</h1>

<div id="pdf-container"></div>

<p><a href="Resume_Ellie_Kuznetsova.pdf" target="_blank">Download CV</a></p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.239/pdf.min.js"></script>
<script>
  const url = 'Resume_Ellie_Kuznetsova.pdf'; // Path to your PDF
  const container = document.getElementById('pdf-container');

  const loadingTask = pdfjsLib.getDocument(url);
  loadingTask.promise.then(pdf => {
    for(let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
      pdf.getPage(pageNum).then(page => {
        const viewport = page.getViewport({scale: 1.2});
        const canvas = document.createElement('canvas');
        container.appendChild(canvas);
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        const renderContext = { canvasContext: context, viewport: viewport };
        page.render(renderContext);
      });
    }
  });
</script>

</body>
</html>
